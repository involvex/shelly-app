name: Build Android Release APK

on:
  push:
    branches: [main]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [main]

  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-android-apk:
    name: Build Android Release APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      EXPO_NO_TELEMETRY: '1'

      GRADLE_OPTS: >-
        -Dorg.gradle.daemon=false
        -Dorg.gradle.parallel=true
        -Dorg.gradle.configureondemand=true
        -Xmx4g
        -XX:MaxMetaspaceSize=512m

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Set up JDK 17 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Restore Bun dependency cache
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install monorepo dependencies
        run: bun install --frozen-lockfile

      - name: Normalize SSH/SFTP Gradle repositories
        run: bun run -F @shelly/mobile patch:ssh-sftp-gradle

      - name: Validate Android SDK environment
        run: |
          SDK_PATH="${ANDROID_HOME:-$ANDROID_SDK_ROOT}"
          if [ -z "$SDK_PATH" ]; then
            echo "::error::Neither ANDROID_HOME nor ANDROID_SDK_ROOT is set."
            echo "::error::ubuntu-latest provides the Android SDK automatically."
            echo "::error::Check whether the runner image version has changed."
            exit 1
          fi

          echo "=== Build environment ==="
          echo "Android SDK path : $SDK_PATH"
          echo "ANDROID_HOME     : ${ANDROID_HOME:-<not set>}"
          echo "ANDROID_SDK_ROOT : ${ANDROID_SDK_ROOT:-<not set>}"
          echo "Java version     : $(java -version 2>&1 | head -1)"
          echo "Bun version      : $(bun --version)"
          echo ""
          echo "=== Installed SDK platforms ==="
          ls "$SDK_PATH/platforms" 2>/dev/null | sort || echo "  (none found)"
          echo ""
          echo "=== Installed build-tools ==="
          ls "$SDK_PATH/build-tools" 2>/dev/null | sort || echo "  (none found)"
          echo ""
          echo "=== NDK versions ==="
          ls "$SDK_PATH/ndk" 2>/dev/null | sort || echo "  (none found)"

      - name: Generate Android native project (expo prebuild)
        working-directory: apps/mobile
        run: bunx expo prebuild --platform android --no-install --clean

      - name: Verify BouncyCastle exclusion in generated app/build.gradle
        run: |
          APP_GRADLE="apps/mobile/android/app/build.gradle"
          PATTERN='exclude group: "org.bouncycastle", module: "bcprov-jdk15on"'
          if ! grep -q "$PATTERN" "$APP_GRADLE"; then
            echo "::warning::BouncyCastle exclusion missing after prebuild. Appending temporary CI safeguard."
            cat <<'EOF' >> "$APP_GRADLE"

          configurations.configureEach {
            exclude group: "org.bouncycastle", module: "bcprov-jdk15on"
          }
          EOF
          fi
          if ! grep -q "$PATTERN" "$APP_GRADLE"; then
            echo "::error::Failed to enforce BouncyCastle exclusion in $APP_GRADLE"
            exit 1
          fi

      - name: Restore Gradle wrapper distribution cache
        uses: actions/cache@v4
        with:
          path: ~/.gradle/wrapper/dists
          key: ${{ runner.os }}-gradle-wrapper-${{ hashFiles('apps/mobile/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-wrapper-
      - name: Restore Gradle dependencies cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            apps/mobile/android/.gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('apps/mobile/android/**/*.gradle*', 'apps/mobile/android/**/*.gradle.kts') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
      - name: Make Gradle wrapper executable
        run: chmod +x apps/mobile/android/gradlew
      - name: Build release APK
        working-directory: apps/mobile/android
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Dependency insight for BouncyCastle on failure
        if: failure()
        working-directory: apps/mobile/android
        run: |
          ./gradlew :app:dependencyInsight \
            --configuration releaseRuntimeClasspath \
            --dependency bcprov \
            --no-daemon || true
      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: shelly-release-apk-${{ github.sha }}
          path: apps/mobile/android/app/build/outputs/apk/release/*.apk
          retention-days: 30
          if-no-files-found: error
      # `if: failure()` — run ONLY when a previous step failed. On successful
      # error about missing report files.
      - name: Upload Gradle build reports on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: gradle-build-reports-${{ github.sha }}
          path: |
            apps/mobile/android/app/build/reports/
            apps/mobile/android/build/reports/
          retention-days: 3
          if-no-files-found: ignore

  create-github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-android-apk
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download release APK artifact
        uses: actions/download-artifact@v4
        with:
          name: shelly-release-apk-${{ github.sha }}
          path: ./release-artifacts
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: 'Shelly ${{ github.ref_name }}'
          files: ./release-artifacts/*.apk
          generate_release_notes: true
          draft: false
          prerelease: false
